<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Market Intelligence — Daily Brief</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Barlow+Condensed:wght@300;400;500;600;700&family=DM+Mono:wght@300;400;500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />

  <style>
    /* ─── DESIGN TOKENS ─── */
    :root {
      --cream:    #F0EAE0;
      --paper:    #EBE4D8;
      --card:     #F5F0E8;
      --ink:      #1C1810;
      --ink2:     #2E2A22;
      --red:      #C41A0E;
      --red-dim:  rgba(196,26,14,.12);
      --muted:    #8A8070;
      --muted2:   #B0A898;
      --border:   #D8D0C4;
      --border2:  #C8BFB0;
      --tick-bg:  #0E0D0B;
      --tick-txt: #E8E0D4;
      --tick-acc: #E8382A;

      --sidebar-w: 230px;
      --ticker-h:  38px;
      --topbar-h:  60px;

      --ff-disp: 'DM Serif Display', Georgia, serif;
      --ff-cond: 'Barlow Condensed', sans-serif;
      --ff-mono: 'DM Mono', 'Courier New', monospace;
      --ff-body: 'Lora', Georgia, serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: var(--ff-body);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ════════════════════════════════════════
       MARKET TICKER STRIP
    ════════════════════════════════════════ */
    .ticker-strip {
      height: var(--ticker-h);
      background: var(--tick-bg);
      overflow: hidden;
      display: flex;
      align-items: center;
      position: relative;
      z-index: 300;
      border-bottom: 2px solid var(--tick-acc);
    }

    .ticker-label {
      flex-shrink: 0;
      font-family: var(--ff-cond);
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--tick-bg);
      background: var(--tick-acc);
      padding: 0 16px;
      height: 100%;
      display: flex;
      align-items: center;
      white-space: nowrap;
    }

    .ticker-track-wrap {
      flex: 1;
      overflow: hidden;
      mask-image: linear-gradient(to right, transparent 0%, black 3%, black 97%, transparent 100%);
    }

    .ticker-track {
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
      animation: scrollTicker 60s linear infinite;
      gap: 0;
    }

    .ticker-track:hover { animation-play-state: paused; }

    @keyframes scrollTicker {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    .ticker-item {
      font-family: var(--ff-mono);
      font-size: .68rem;
      font-weight: 400;
      color: var(--tick-txt);
      padding: 0 32px;
      white-space: nowrap;
    }

    .ticker-item .t-key   { color: var(--muted2); margin-right: 6px; letter-spacing: .04em; }
    .ticker-item .t-up    { color: #4CD08A; }
    .ticker-item .t-down  { color: var(--tick-acc); }
    .ticker-item .t-sep   { color: #3a3830; margin: 0 24px; }

    /* ════════════════════════════════════════
       TOPBAR
    ════════════════════════════════════════ */
    .topbar {
      height: var(--topbar-h);
      background: var(--cream);
      border-bottom: 1px solid var(--border2);
      position: sticky;
      top: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      gap: 0;
    }

    .tb-logo-wrap {
      width: var(--sidebar-w);
      flex-shrink: 0;
      padding: 0 22px;
      display: flex;
      align-items: baseline;
      gap: 10px;
      border-right: 1px solid var(--border2);
      height: 100%;
    }

    .logo-title {
      font-family: var(--ff-disp);
      font-style: italic;
      font-size: 1.45rem;
      color: var(--ink);
      letter-spacing: -.01em;
      line-height: 1;
    }

    .logo-title span { color: var(--red); font-style: normal; }

    .logo-sub {
      font-family: var(--ff-cond);
      font-size: .6rem;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    .tb-right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      gap: 16px;
    }

    .tb-search-wrap { position: relative; flex: 1; max-width: 360px; }

    .tb-search-icon {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      color: var(--muted2); pointer-events: none;
    }

    .tb-search {
      width: 100%;
      background: var(--paper);
      border: 1px solid var(--border);
      color: var(--ink);
      font-family: var(--ff-cond);
      font-size: .85rem;
      font-weight: 400;
      padding: 7px 32px 7px 34px;
      outline: none;
      border-radius: 3px;
      transition: border-color .15s, background .15s;
    }

    .tb-search::placeholder { color: var(--muted2); }
    .tb-search:focus { border-color: var(--border2); background: var(--card); }

    .tb-search-clear {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: .95rem; display: none; line-height: 1;
    }
    .tb-search-clear.show { display: block; }

    .tb-right-meta {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-shrink: 0;
    }

    .tb-live {
      display: flex; align-items: center; gap: 6px;
      font-family: var(--ff-cond);
      font-size: .62rem;
      font-weight: 600;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #2EAD6A;
      animation: livePulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes livePulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.35;transform:scale(.7)} }

    .tb-clock {
      font-family: var(--ff-mono);
      font-size: .7rem;
      color: var(--muted2);
      letter-spacing: .04em;
    }

    .view-toggle {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 3px;
      overflow: hidden;
      background: var(--paper);
    }

    .view-btn {
      background: none; border: none; color: var(--muted2);
      padding: 6px 11px; cursor: pointer; font-size: .72rem;
      display: flex; align-items: center; gap: 5px;
      font-family: var(--ff-cond); font-weight: 600;
      letter-spacing: .06em; text-transform: uppercase;
      transition: background .15s, color .15s;
    }
    .view-btn.active { background: var(--ink); color: var(--cream); }

    .ham-btn {
      display: none; background: none; border: none;
      color: var(--ink); cursor: pointer; padding: 6px; flex-shrink: 0;
    }

    /* ════════════════════════════════════════
       APP SHELL
    ════════════════════════════════════════ */
    .app-shell {
      display: flex;
      min-height: calc(100vh - var(--ticker-h) - var(--topbar-h));
    }

    /* ════════════════════════════════════════
       SIDEBAR
    ════════════════════════════════════════ */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--paper);
      border-right: 1px solid var(--border2);
      position: sticky;
      top: var(--topbar-h);
      height: calc(100vh - var(--ticker-h) - var(--topbar-h));
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      z-index: 150;
    }

    .sb-section {
      padding: 18px 14px 10px;
    }

    .sb-section + .sb-section {
      border-top: 1px solid var(--border);
    }

    .sb-label {
      font-family: var(--ff-cond);
      font-size: .58rem;
      font-weight: 700;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--muted2);
      padding: 0 8px;
      margin-bottom: 8px;
      display: block;
    }

    .nav-item {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 10px;
      border: none;
      background: none;
      color: var(--muted);
      font-family: var(--ff-cond);
      font-size: .82rem;
      font-weight: 500;
      text-align: left;
      cursor: pointer;
      border-radius: 3px;
      transition: background .15s, color .15s;
      letter-spacing: .02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .nav-item:hover  { background: var(--border); color: var(--ink2); }
    .nav-item.active {
      background: var(--ink);
      color: var(--cream);
    }

    .nav-pip {
      width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
    }

    .nav-count {
      margin-left: auto;
      font-family: var(--ff-mono);
      font-size: .58rem;
      font-weight: 400;
      color: var(--muted2);
      background: var(--cream);
      border: 1px solid var(--border);
      padding: 1px 6px;
      border-radius: 2px;
      flex-shrink: 0;
      transition: background .15s, color .15s;
    }

    .nav-item.active .nav-count {
      background: rgba(255,255,255,.15);
      border-color: transparent;
      color: var(--cream);
    }

    .sb-stats {
      padding: 14px;
      margin-top: auto;
      border-top: 1px solid var(--border);
    }

    .sb-stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px dashed var(--border);
    }
    .sb-stat-row:last-child { border-bottom: none; }

    .sb-stat-key {
      font-family: var(--ff-cond);
      font-size: .62rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .sb-stat-val {
      font-family: var(--ff-mono);
      font-size: .7rem;
      color: var(--ink2);
    }

    .refresh-btn {
      width: calc(100% - 28px);
      margin: 12px 14px 14px;
      background: var(--ink);
      color: var(--cream);
      border: none;
      font-family: var(--ff-cond);
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 10px;
      cursor: pointer;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity .15s;
    }
    .refresh-btn:hover { opacity: .8; }
    .refresh-btn.spinning svg { animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ════════════════════════════════════════
       MAIN CONTENT
    ════════════════════════════════════════ */
    .main-content {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    /* Stats band */
    .stats-band {
      display: none;
      grid-template-columns: repeat(4, 1fr);
      border-bottom: 1px solid var(--border);
      background: var(--paper);
    }

    .stat-cell {
      padding: 14px 20px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .stat-cell:last-child { border-right: none; }

    .stat-val {
      font-family: var(--ff-cond);
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--ink);
      line-height: 1;
      letter-spacing: -.02em;
    }

    .stat-lbl {
      font-family: var(--ff-mono);
      font-size: .58rem;
      font-weight: 300;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Content area */
    .content-area {
      padding: 24px 26px 48px;
      flex: 1;
    }

    .search-result-info {
      font-family: var(--ff-mono);
      font-size: .68rem;
      color: var(--muted);
      margin-bottom: 18px;
      display: none;
    }
    .search-result-info.show { display: block; }

    /* Category section */
    .cat-section {
      margin-bottom: 36px;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp .4s ease forwards;
    }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    .cat-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--border);
      position: relative;
    }

    .cat-header::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 48px;
      height: 2px;
      background: var(--red);
    }

    .cat-name {
      font-family: var(--ff-cond);
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--ink);
    }

    .cat-count {
      font-family: var(--ff-mono);
      font-size: .6rem;
      color: var(--muted);
      background: var(--paper);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 2px;
    }

    .cat-line { flex: 1; height: 1px; background: var(--border); }

    /* Card Grid */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 10px;
    }

    .card-grid.list-view {
      grid-template-columns: 1fr;
    }

    /* Cards */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
      overflow: hidden;
      cursor: pointer;
      transition: border-color .2s, box-shadow .2s, transform .2s;
      position: relative;
    }

    .card:hover {
      border-color: var(--border2);
      box-shadow: 0 4px 20px rgba(28,24,16,.1);
      transform: translateY(-2px);
    }

    .card-top-rule {
      height: 3px;
      width: 100%;
      flex-shrink: 0;
    }

    .card.list-view-card {
      flex-direction: row;
      transform: none !important;
    }
    .card.list-view-card:hover { transform: none !important; }

    .card.list-view-card .card-top-rule {
      width: 3px;
      height: auto;
    }

    .card-body {
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-badge {
      font-family: var(--ff-cond);
      font-size: .58rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 2px;
      border-width: 1px;
      border-style: solid;
    }

    .card-index {
      font-family: var(--ff-mono);
      font-size: .58rem;
      color: var(--muted2);
      margin-left: auto;
    }

    .card-title {
      font-family: var(--ff-disp);
      font-size: .92rem;
      font-weight: 400;
      color: var(--ink);
      line-height: 1.4;
      letter-spacing: -.01em;
      transition: color .15s;
    }
    .card:hover .card-title { color: var(--red); }

    .card-summary {
      font-family: var(--ff-body);
      font-size: .77rem;
      color: var(--muted);
      line-height: 1.7;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card.list-view-card .card-summary { -webkit-line-clamp: 2; }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      margin-top: 4px;
    }

    .card-domain {
      font-family: var(--ff-mono);
      font-size: .58rem;
      color: var(--muted2);
      letter-spacing: .04em;
    }

    .card-date {
      font-family: var(--ff-mono);
      font-size: .58rem;
      color: var(--muted2);
    }

    .card-arrow {
      font-family: var(--ff-cond);
      font-size: .7rem;
      font-weight: 600;
      color: var(--muted2);
      letter-spacing: .06em;
      transition: color .15s, transform .15s;
      display: inline-block;
    }
    .card:hover .card-arrow { color: var(--red); transform: translateX(3px); }

    /* search highlight */
    mark {
      background: rgba(196,26,14,.15);
      color: var(--ink);
      border-radius: 2px;
      padding: 0 1px;
    }

    /* ─── STATES ─── */
    .state-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 20px;
      text-align: center;
      gap: 14px;
    }

    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border2);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    .state-title {
      font-family: var(--ff-cond);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--ink);
    }

    .state-msg {
      font-family: var(--ff-body);
      font-size: .8rem;
      color: var(--muted);
      max-width: 340px;
      line-height: 1.7;
    }

    .no-results {
      display: none;
      text-align: center;
      padding: 70px 20px;
      color: var(--muted);
    }
    .no-results.show { display: block; }
    .no-results .nr-glyph {
      font-family: var(--ff-disp);
      font-size: 3rem;
      opacity: .12;
      margin-bottom: 12px;
    }
    .no-results strong {
      display: block;
      font-family: var(--ff-cond);
      font-size: .9rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--ink2);
      margin-bottom: 6px;
    }

    /* ─── SIDEBAR OVERLAY (mobile) ─── */
    .sb-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(28,24,16,.5);
      z-index: 140;
    }

    /* ─── CATEGORY COLOR PALETTE ─── */
    /* Applied via JS inline styles */

    /* ─── RESPONSIVE ─── */
    @media (max-width: 900px) {
      .sidebar {
        position: fixed;
        top: 0; left: 0; bottom: 0;
        transform: translateX(-100%);
        transition: transform .25s ease;
        height: 100vh;
        z-index: 160;
      }
      .sidebar.open { transform: translateX(0); }
      .sb-overlay.open { display: block; }
      .main-content { width: 100%; }
      .app-shell { width: 100%; }
      .ham-btn { display: flex; }
      .stats-band { grid-template-columns: repeat(2, 1fr); }
      .tb-logo-wrap { border-right: none; width: auto; }
    }

    @media (max-width: 560px) {
      .card-grid { grid-template-columns: 1fr; }
      .stats-band { grid-template-columns: 1fr 1fr; }
      .content-area { padding: 16px; }
      .tb-right-meta .tb-clock { display: none; }
    }
  </style>
</head>
<body>

<!-- MARKET TICKER STRIP -->
<div class="ticker-strip" id="tickerStrip">
  <div class="ticker-label">◆ Markets</div>
  <div class="ticker-track-wrap">
    <div class="ticker-track" id="tickerTrack">
      <span class="ticker-item"><span class="t-key">Loading market data…</span></span>
    </div>
  </div>
</div>

<!-- TOPBAR -->
<header class="topbar">
  <button class="ham-btn" id="hamBtn" onclick="toggleSb()" aria-label="Toggle menu">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>

  <div class="tb-logo-wrap">
    <div>
      <div class="logo-title">Market<span>.</span></div>
      <div class="logo-sub">Intelligence Brief</div>
    </div>
  </div>

  <div class="tb-right">
    <div class="tb-search-wrap">
      <svg class="tb-search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input class="tb-search" id="searchInput" type="text" placeholder="Search stories, categories…"
             oninput="handleSearch(this.value)" autocomplete="off" />
      <button class="tb-search-clear" id="searchClear" onclick="clearSearch()">×</button>
    </div>

    <div class="tb-right-meta">
      <div class="tb-live">
        <span class="live-dot"></span>
        Auto-feed
      </div>
      <div class="tb-clock" id="clock">—</div>
      <div class="view-toggle">
        <button class="view-btn active" id="vGrid" onclick="setView('grid', this)">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
          Grid
        </button>
        <button class="view-btn" id="vList" onclick="setView('list', this)">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
          List
        </button>
      </div>
    </div>
  </div>
</header>

<div class="sb-overlay" id="sbOverlay" onclick="closeSb()"></div>

<!-- APP SHELL -->
<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">

    <div class="sb-section">
      <span class="sb-label">Views</span>
      <button class="nav-item active" id="nav-ALL" onclick="filterCat('ALL', this)">
        <span class="nav-pip" style="background:#1C1810"></span>
        All Stories
        <span class="nav-count" id="cnt-ALL">—</span>
      </button>
    </div>

    <div class="sb-section" id="catNav" style="flex:1;overflow-y:auto">
      <span class="sb-label">Categories</span>
      <!-- Injected by JS -->
    </div>

    <div class="sb-stats" id="sbStats" style="display:none">
      <div class="sb-stat-row">
        <span class="sb-stat-key">Total</span>
        <span class="sb-stat-val" id="st-total">—</span>
      </div>
      <div class="sb-stat-row">
        <span class="sb-stat-key">Showing</span>
        <span class="sb-stat-val" id="st-showing">—</span>
      </div>
      <div class="sb-stat-row">
        <span class="sb-stat-key">Updated</span>
        <span class="sb-stat-val" id="st-updated">—</span>
      </div>
    </div>

    <button class="refresh-btn" id="refreshBtn" onclick="loadNews()">
      <svg id="refreshIcon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Refresh Feed
    </button>
  </aside>

  <!-- MAIN -->
  <div class="main-content">

    <!-- Stats Band -->
    <div class="stats-band" id="statsBand">
      <div class="stat-cell">
        <div class="stat-val" id="sTotal">—</div>
        <div class="stat-lbl">Total Stories</div>
      </div>
      <div class="stat-cell">
        <div class="stat-val" id="sCats">—</div>
        <div class="stat-lbl">Categories</div>
      </div>
      <div class="stat-cell">
        <div class="stat-val" id="sShowing">—</div>
        <div class="stat-lbl">Showing</div>
      </div>
      <div class="stat-cell">
        <div class="stat-val" id="sUpdated">—</div>
        <div class="stat-lbl">Last Refresh</div>
      </div>
    </div>

    <!-- Content -->
    <div class="content-area">
      <div class="search-result-info" id="searchInfo"></div>
      <div class="no-results" id="noResults">
        <div class="nr-glyph">◌</div>
        <strong>No stories found</strong>
        Try a different search term or choose another category.
      </div>
      <div id="content">
        <div class="state-box">
          <div class="spinner"></div>
          <div class="state-title">Loading Feed</div>
          <div class="state-msg">Fetching the latest intelligence digest…</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   CATEGORY CONFIG — color palette per category
═══════════════════════════════════════════════════ */
const CAT_PALETTE = {
  "Current Affairs - Global": { fg: '#1D6FA4', bg: '#EBF3FA', border: '#B8D8EE' },
  "Current Affairs - India":  { fg: '#1E7C52', bg: '#EBF7F1', border: '#B4E2CD' },
  "BizNews - Global":         { fg: '#9B4C00', bg: '#FBF0E7', border: '#E8C8A4' },
  "BizNews - India":          { fg: '#B8180D', bg: '#FBECEb', border: '#E8B4B0' },
  "Fintech - AI in Finance":  { fg: '#5C3DA6', bg: '#F2EEF9', border: '#CCBCEA' },
  "AI - Global and India":    { fg: '#1A6B6B', bg: '#EBF5F5', border: '#B0D8D8' },
};

const DEFAULT_PAL = { fg: '#6B6050', bg: '#F2EDE4', border: '#D4CCBF' };

const ORDERED_CATS = [
  "Current Affairs - Global",
  "Current Affairs - India",
  "BizNews - Global",
  "BizNews - India",
  "Fintech - AI in Finance",
  "AI - Global and India",
];

/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
let allItems     = [];
let displayItems = [];   // allItems minus MARKET_TICKER
let activeFilter = 'ALL';
let view         = 'grid';
let q            = '';
let loadedAt     = null;

/* ═══════════════════════════════════════════════════
   CLOCK
═══════════════════════════════════════════════════ */
(function tick() {
  const n = new Date(), p = v => String(v).padStart(2, '0');
  const el = document.getElementById('clock');
  if (el) el.textContent =
    `${p(n.getUTCHours())}:${p(n.getUTCMinutes())}:${p(n.getUTCSeconds())} UTC`;
  setTimeout(tick, 1000);
})();

/* ═══════════════════════════════════════════════════
   TICKER BUILDER
═══════════════════════════════════════════════════ */
function buildTicker(tickerText) {
  const track = document.getElementById('tickerTrack');
  if (!tickerText || !tickerText.trim()) {
    track.innerHTML = '<span class="ticker-item"><span class="t-key">Market data unavailable</span></span>';
    return;
  }

  /*
   * Expected summary format (from backend):
   * "NIFTY 50: 24,523.15 (+1.2%) | SENSEX: 80,234.56 (+1.1%) | S&P 500: 5,780 (+0.4%) | NASDAQ: 18,450 (+0.6%)"
   * We parse pipe-separated segments, then colon-split for key/value.
   */
  const segments = tickerText.split('|').map(s => s.trim()).filter(Boolean);

  const buildSegment = s => {
    const colonIdx = s.indexOf(':');
    if (colonIdx === -1) return `<span class="ticker-item"><span class="t-key">${esc(s)}</span></span>`;
    const key = s.slice(0, colonIdx).trim();
    const val = s.slice(colonIdx + 1).trim();

    // Detect directional signal
    const hasUp   = val.includes('+');
    const hasDown  = val.includes('-') && (val.includes('%') || val.includes('('));
    const valClass = hasUp ? 't-up' : hasDown ? 't-down' : '';

    return `<span class="ticker-item"><span class="t-key">${esc(key)}</span><span class="${valClass}">${esc(val)}</span><span class="t-sep">◆</span></span>`;
  };

  const html = segments.map(buildSegment).join('');
  // Double for seamless infinite loop
  track.innerHTML = html + html;

  // Adjust animation duration to content length
  const totalLen = segments.reduce((a, s) => a + s.length, 0);
  const dur = Math.max(30, Math.min(90, totalLen * 0.6));
  track.style.animationDuration = dur + 's';
}

/* ═══════════════════════════════════════════════════
   DATA LOAD
═══════════════════════════════════════════════════ */
async function loadNews() {
  setContent(`<div class="state-box">
    <div class="spinner"></div>
    <div class="state-title">Loading Feed</div>
    <div class="state-msg">Fetching the latest intelligence digest…</div>
  </div>`);

  document.getElementById('statsBand').style.display = 'none';
  document.getElementById('sbStats').style.display   = 'none';
  document.getElementById('noResults').classList.remove('show');
  document.getElementById('searchInfo').classList.remove('show');

  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');

  try {
    const res = await fetch('./data.json?t=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!Array.isArray(data) || !data.length) throw new Error('Empty dataset');

    allItems = data;
    loadedAt = new Date();

    // ── Extract MARKET_TICKER ──────────────────────────────
    const tickerItem = allItems.find(
      i => i.title === 'MARKET_TICKER' && (i.category || '').trim() === 'BizNews - India'
    );

    if (tickerItem) {
      buildTicker(tickerItem.summary || '');
    } else {
      // Fallback: try any MARKET_TICKER anywhere
      const fallback = allItems.find(i => i.title === 'MARKET_TICKER');
      if (fallback) buildTicker(fallback.summary || '');
    }

    // Exclude MARKET_TICKER from cards
    displayItems = allItems.filter(i => i.title !== 'MARKET_TICKER');

    renderDashboard();

  } catch (err) {
    setContent(`<div class="state-box">
      <div style="font-size:1.8rem;opacity:.2;font-family:var(--ff-disp)">⚠</div>
      <div class="state-title">Feed Unavailable</div>
      <div class="state-msg">
        Could not load <code style="font-family:var(--ff-mono);color:var(--red)">data.json</code>.
        Ensure the backend has run and the file exists.<br><br>
        <span style="font-size:.7rem;font-family:var(--ff-mono);color:var(--muted2)">${esc(err.message)}</span>
      </div>
    </div>`);
  } finally {
    btn.classList.remove('spinning');
  }
}

/* ═══════════════════════════════════════════════════
   RENDER DASHBOARD
═══════════════════════════════════════════════════ */
function renderDashboard() {
  const cats = ORDERED_CATS.filter(c =>
    displayItems.some(i => (i.category || '').trim() === c)
  );

  // Stats band
  const band = document.getElementById('statsBand');
  band.style.display = 'grid';
  document.getElementById('sTotal').textContent   = displayItems.length;
  document.getElementById('sCats').textContent    = cats.length;
  document.getElementById('sShowing').textContent = displayItems.length;
  if (loadedAt) {
    const p = v => String(v).padStart(2,'0');
    document.getElementById('sUpdated').textContent =
      `${p(loadedAt.getUTCHours())}:${p(loadedAt.getUTCMinutes())}`;
  }

  // Sidebar stats
  const sbStats = document.getElementById('sbStats');
  sbStats.style.display = 'block';
  document.getElementById('cnt-ALL').textContent   = displayItems.length;
  document.getElementById('st-total').textContent   = displayItems.length;
  document.getElementById('st-showing').textContent = displayItems.length;
  if (loadedAt) {
    const p = v => String(v).padStart(2,'0');
    document.getElementById('st-updated').textContent =
      `${p(loadedAt.getUTCHours())}:${p(loadedAt.getUTCMinutes())} UTC`;
  }

  // Sidebar category nav
  const catNav = document.getElementById('catNav');
  catNav.querySelectorAll('.nav-item').forEach(b => b.remove());

  cats.forEach(cat => {
    const pal = CAT_PALETTE[cat] || DEFAULT_PAL;
    const count = displayItems.filter(i => (i.category||'').trim() === cat).length;
    const btn = document.createElement('button');
    btn.className = 'nav-item';
    btn.id = 'nav-' + slugify(cat);
    btn.innerHTML = `
      <span class="nav-pip" style="background:${pal.fg}"></span>
      ${esc(cat)}
      <span class="nav-count">${count}</span>`;
    btn.onclick = () => filterCat(cat, btn);
    catNav.appendChild(btn);
  });

  renderItems(cats);
}

/* ═══════════════════════════════════════════════════
   RENDER ITEMS
═══════════════════════════════════════════════════ */
function renderItems(cats) {
  if (!cats) {
    cats = ORDERED_CATS.filter(c =>
      displayItems.some(i => (i.category || '').trim() === c)
    );
  }

  // Filter by category
  let items = activeFilter === 'ALL'
    ? displayItems
    : displayItems.filter(i => (i.category || '').trim() === activeFilter);

  // Filter by search
  const sq = q.trim().toLowerCase();
  if (sq) {
    items = items.filter(i =>
      (i.title    || '').toLowerCase().includes(sq) ||
      (i.summary  || '').toLowerCase().includes(sq) ||
      (i.category || '').toLowerCase().includes(sq)
    );
  }

  // Update showing counts
  document.getElementById('sShowing').textContent    = items.length;
  document.getElementById('st-showing').textContent  = items.length;

  // Search info
  const si = document.getElementById('searchInfo');
  if (sq) {
    si.textContent = `${items.length} result${items.length !== 1 ? 's' : ''} for "${q}"`;
    si.classList.add('show');
  } else {
    si.classList.remove('show');
  }

  const noRes = document.getElementById('noResults');

  if (!items.length) {
    setContent('');
    noRes.classList.add('show');
    return;
  }
  noRes.classList.remove('show');

  // Group by category (preserve ORDERED_CATS order)
  const visibleCats = cats.filter(c =>
    items.some(i => (i.category || '').trim() === c)
  );

  const frag = document.createDocumentFragment();
  visibleCats.forEach((cat, gi) => {
    const list = items.filter(i => (i.category || '').trim() === cat);
    const pal  = CAT_PALETTE[cat] || DEFAULT_PAL;

    const sec = document.createElement('div');
    sec.className = 'cat-section';
    sec.style.animationDelay = (gi * .07) + 's';

    sec.innerHTML = `
      <div class="cat-header">
        <span class="cat-name" style="color:${pal.fg}">${esc(cat)}</span>
        <span class="cat-count">${list.length} ${list.length === 1 ? 'story' : 'stories'}</span>
        <div class="cat-line"></div>
      </div>
      <div class="card-grid${view === 'list' ? ' list-view' : ''}" id="grid-${gi}"></div>`;

    frag.appendChild(sec);

    const grid = sec.querySelector('.card-grid');
    list.forEach((item, idx) => grid.appendChild(makeCard(item, idx, pal, sq)));
  });

  const content = document.getElementById('content');
  content.innerHTML = '';
  content.appendChild(frag);
}

/* ═══════════════════════════════════════════════════
   CARD BUILDER
═══════════════════════════════════════════════════ */
function makeCard(item, idx, pal, sq) {
  const a = document.createElement('a');
  const hasLink = item.link && item.link !== '#';
  a.className = 'card' + (view === 'list' ? ' list-view-card' : '');
  a.href      = hasLink ? item.link : '#';
  if (hasLink) { a.target = '_blank'; a.rel = 'noopener noreferrer'; }

  let domain = '';
  if (hasLink) {
    try { domain = new URL(item.link).hostname.replace(/^www\./, ''); } catch {}
  }

  const title   = hl(esc(item.title   || 'Untitled'), sq);
  const summary = hl(esc(item.summary || ''), sq);
  const date    = item.date ? esc(item.date) : '';

  a.innerHTML = `
    <div class="card-top-rule" style="background:${pal.fg}"></div>
    <div class="card-body">
      <div class="card-meta">
        <span class="card-badge" style="color:${pal.fg};background:${pal.bg};border-color:${pal.border}">
          ${esc(item.category || 'General')}
        </span>
        <span class="card-index">#${String(idx + 1).padStart(2, '0')}</span>
      </div>
      <div class="card-title">${title}</div>
      <div class="card-summary">${summary}</div>
      <div class="card-footer">
        <span class="card-domain">${domain || (date || '—')}</span>
        <span class="card-arrow">${hasLink ? 'Read →' : '—'}</span>
      </div>
    </div>`;

  return a;
}

/* ═══════════════════════════════════════════════════
   FILTER / SEARCH / VIEW
═══════════════════════════════════════════════════ */
function filterCat(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  if (btn) {
    btn.classList.add('active');
  } else {
    const el = document.getElementById(cat === 'ALL' ? 'nav-ALL' : 'nav-' + slugify(cat));
    if (el) el.classList.add('active');
  }
  // On mobile: close sidebar after selecting
  if (window.innerWidth < 900) closeSb();
  renderItems();
}

let searchTimer;
function handleSearch(val) {
  q = val;
  document.getElementById('searchClear').classList.toggle('show', val.length > 0);
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => renderItems(), 130);
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  q = '';
  document.getElementById('searchClear').classList.remove('show');
  renderItems();
}

function setView(v, btn) {
  view = v;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderItems();
}

/* ═══════════════════════════════════════════════════
   SIDEBAR MOBILE TOGGLE
═══════════════════════════════════════════════════ */
function toggleSb() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sbOverlay');
  const isOpen = sb.classList.contains('open');
  isOpen ? closeSb() : openSb();
}
function openSb() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sbOverlay').classList.add('open');
}
function closeSb() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sbOverlay').classList.remove('open');
}

/* ═══════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════ */
function setContent(html) {
  document.getElementById('content').innerHTML = html;
}

function esc(s) {
  return String(s)
    .replace(/&/g,  '&amp;')
    .replace(/</g,  '&lt;')
    .replace(/>/g,  '&gt;')
    .replace(/"/g,  '&quot;')
    .replace(/'/g,  '&#039;');
}

function hl(html, sq) {
  if (!sq) return html;
  const rx = sq.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return html.replace(new RegExp(`(${rx})`, 'gi'), '<mark>$1</mark>');
}

function slugify(s) {
  return s.replace(/[^a-z0-9]/gi, '-').toLowerCase();
}

/* ═══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
loadNews();
</script>

</body>
</html>
