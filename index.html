<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News Dashboard — AI Intelligence Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Tomorrow (mono/display) + Nunito (body, closest available to Agrandir) -->
  <link href="https://fonts.googleapis.com/css2?family=Tomorrow:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Nunito:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ─── TOKENS ─────────────────────────────────────────────────────────────── */
    :root {
      /* Blue/indigo palette from template */
      --bg-base:       #0b0d1a;
      --bg-surface:    #10142a;
      --bg-elevated:   #171c36;
      --bg-overlay:    #1e2444;
      --border-dim:    rgba(99,122,255,0.10);
      --border-mid:    rgba(99,122,255,0.18);
      --border-bright: rgba(99,122,255,0.32);

      --text-primary:  #eef0fb;
      --text-secondary:#9097c4;
      --text-muted:    #4a5080;

      /* Primary accent: cobalt blue from template */
      --accent-blue:      #4361ee;
      --accent-blue-dim:  rgba(67,97,238,0.14);
      --accent-blue-bright:#6580f5;
      /* Secondary: indigo/violet from the darker swatch */
      --accent-indigo:    #3730a3;
      --accent-indigo-dim:rgba(55,48,163,0.18);
      /* Supporting accents */
      --accent-cyan:      #38bdf8;
      --accent-cyan-dim:  rgba(56,189,248,0.10);
      --accent-green:     #34d399;
      --accent-red:       #f87171;
      --accent-amber:     #fbbf24;
      --accent-purple:    #818cf8;
      --accent-teal:      #2dd4bf;
      --accent-rose:      #fb7185;

      --radius-sm:  6px;
      --radius-md:  10px;
      --radius-lg:  14px;
      --radius-xl:  20px;

      --font-display: 'Tomorrow', sans-serif;
      --font-body:    'Nunito', sans-serif;
      --font-mono:    'DM Mono', monospace;

      --ticker-height: 44px;
      --header-height: 60px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }

    body {
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Subtle grid texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border-dim) 1px, transparent 1px),
        linear-gradient(90deg, var(--border-dim) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    /* Top glow — indigo/blue from template palette */
    body::after {
      content: '';
      position: fixed;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 1000px;
      height: 300px;
      background: radial-gradient(ellipse, rgba(67,97,238,0.13) 0%, rgba(55,48,163,0.06) 50%, transparent 75%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── TICKER BANNER ──────────────────────────────────────────────────────── */
    .ticker-banner {
      position: sticky;
      top: 0;
      z-index: 200;
      height: var(--ticker-height);
      background: linear-gradient(90deg, #080a18 0%, var(--bg-surface) 50%, #080a18 100%);
      border-bottom: 1px solid var(--border-mid);
      display: flex;
      align-items: center;
      overflow: hidden;
      box-shadow: 0 2px 24px rgba(67,97,238,0.18);
    }

    .ticker-label {
      flex-shrink: 0;
      padding: 0 16px;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent-blue-bright);
      background: var(--accent-blue-dim);
      border-right: 1px solid var(--border-mid);
      height: 100%;
      display: flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
    }

    .ticker-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-green);
      box-shadow: 0 0 8px var(--accent-green);
      animation: blink 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes blink {
      0%,100% { opacity:1; }
      50%      { opacity:0.3; }
    }

    .ticker-scroll-wrap {
      flex: 1;
      overflow: hidden;
      height: 100%;
      display: flex;
      align-items: center;
      mask-image: linear-gradient(90deg, transparent, black 4%, black 96%, transparent);
      -webkit-mask-image: linear-gradient(90deg, transparent, black 4%, black 96%, transparent);
    }

    .ticker-track {
      display: flex;
      align-items: center;
      gap: 0;
      white-space: nowrap;
      animation: scroll-ticker 45s linear infinite;
    }

    .ticker-track:hover { animation-play-state: paused; }

    @keyframes scroll-ticker {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    .ticker-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 28px;
      border-right: 1px solid var(--border-dim);
      font-family: var(--font-mono);
      font-size: 11.5px;
    }

    .ticker-symbol {
      font-weight: 500;
      color: var(--text-primary);
      letter-spacing: 0.04em;
    }

    .ticker-val {
      color: var(--text-secondary);
    }

    .ticker-chg.up   { color: var(--accent-green); }
    .ticker-chg.down { color: var(--accent-red); }
    .ticker-chg.flat { color: var(--text-muted); }

    /* ─── HEADER ─────────────────────────────────────────────────────────────── */
    header {
      position: sticky;
      top: var(--ticker-height);
      z-index: 100;
      height: var(--header-height);
      background: rgba(8,11,16,0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-dim);
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .logo-wrap {
      display: flex;
      align-items: baseline;
      gap: 10px;
      text-decoration: none;
    }

    .logo-text {
      font-family: var(--font-display);
      font-size: 1.45rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      line-height: 1;
    }

    .logo-text span {
      color: var(--accent-blue-bright);
    }

    .logo-tag {
      font-family: var(--font-mono);
      font-size: 9.5px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      border: 1px solid var(--border-dim);
      padding: 2px 7px;
      border-radius: var(--radius-sm);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .ts-display {
      font-family: var(--font-mono);
      font-size: 10.5px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    .refresh-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-mid);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      font-family: var(--font-mono);
      font-size: 10.5px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .refresh-btn:hover {
      background: var(--accent-blue-dim);
      border-color: var(--accent-blue-bright);
      color: var(--accent-blue-bright);
    }

    .refresh-btn svg {
      transition: transform 0.4s;
    }

    .refresh-btn:hover svg { transform: rotate(180deg); }

    /* ─── MAIN LAYOUT ────────────────────────────────────────────────────────── */
    main {
      position: relative;
      z-index: 1;
      max-width: 1440px;
      margin: 0 auto;
      padding: 2rem 1.5rem 5rem;
    }

    /* ─── STATS ROW ──────────────────────────────────────────────────────────── */
    .stats-row {
      display: flex;
      align-items: center;
      gap: 2px;
      margin-bottom: 2rem;
      background: var(--bg-surface);
      border: 1px solid var(--border-dim);
      border-radius: var(--radius-lg);
      padding: 0;
      overflow: hidden;
    }

    .stat-cell {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem 1.5rem;
      border-right: 1px solid var(--border-dim);
      gap: 3px;
    }

    .stat-cell:last-child { border-right: none; }

    .stat-num {
      font-family: var(--font-display);
      font-size: 1.7rem;
      font-weight: 700;
      line-height: 1;
      color: var(--accent-blue-bright);
    }

    .stat-lbl {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ─── FILTER TABS ────────────────────────────────────────────────────────── */
    .filter-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .filter-label {
      font-family: var(--font-mono);
      font-size: 9.5px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-right: 4px;
    }

    .filter-tab {
      padding: 5px 16px;
      background: transparent;
      border: 1px solid var(--border-dim);
      border-radius: 100px;
      color: var(--text-secondary);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .filter-tab:hover {
      border-color: var(--border-bright);
      color: var(--text-primary);
      background: var(--bg-elevated);
    }

    .filter-tab.active {
      background: var(--accent-blue);
      border-color: var(--accent-blue);
      color: #fff;
      font-weight: 600;
    }

    /* ─── CATEGORY SECTION ───────────────────────────────────────────────────── */
    .cat-section {
      margin-bottom: 2.5rem;
      opacity: 0;
      transform: translateY(20px);
      animation: rise 0.45s ease forwards;
    }

    @keyframes rise {
      to { opacity:1; transform:translateY(0); }
    }

    .cat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1rem;
    }

    .cat-title {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .cat-pill {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 9px;
      border-radius: 100px;
      border: 1px solid;
    }

    .cat-line {
      flex: 1;
      height: 1px;
      background: var(--border-dim);
    }

    /* ─── CARD GRID ──────────────────────────────────────────────────────────── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 12px;
    }

    /* ─── CARD ───────────────────────────────────────────────────────────────── */
    .card {
      position: relative;
      background: var(--bg-surface);
      border: 1px solid var(--border-dim);
      border-radius: var(--radius-lg);
      padding: 1.1rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 9px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, background 0.2s, transform 0.2s, box-shadow 0.2s;
      overflow: hidden;
    }

    .card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--card-accent, var(--accent-cyan));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s ease;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }

    .card:hover {
      background: var(--bg-elevated);
      border-color: var(--border-mid);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .card:hover::after {
      transform: scaleX(1);
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .card-badge {
      font-family: var(--font-mono);
      font-size: 9.5px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 9px;
      border-radius: 100px;
      border: 1px solid;
      font-weight: 500;
      white-space: nowrap;
    }

    .card-date {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .card-title {
      font-size: 13.5px;
      font-weight: 600;
      line-height: 1.45;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      transition: color 0.15s;
    }

    .card:hover .card-title {
      color: #fff;
    }

    .card-summary {
      font-size: 12.5px;
      line-height: 1.65;
      color: var(--text-secondary);
      flex: 1;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-top: 8px;
      border-top: 1px solid var(--border-dim);
      margin-top: auto;
    }

    .card-cta {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      transition: color 0.15s;
    }

    .card:hover .card-cta {
      color: var(--card-accent, var(--accent-cyan));
    }

    /* ─── LOAD STATES ────────────────────────────────────────────────────────── */
    .state-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 7rem 2rem;
      gap: 16px;
      text-align: center;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 2px solid var(--border-dim);
      border-top-color: var(--accent-cyan);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .state-title {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.02em;
    }

    .state-msg {
      font-size: 12.5px;
      color: var(--text-muted);
      max-width: 340px;
      line-height: 1.6;
    }

    .err-code {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--accent-red);
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: var(--radius-sm);
      padding: 6px 12px;
      max-width: 380px;
    }

    /* ─── FOOTER ─────────────────────────────────────────────────────────────── */
    footer {
      position: relative;
      z-index: 1;
      border-top: 1px solid var(--border-dim);
      padding: 1.5rem;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.06em;
    }

    footer strong {
      color: var(--text-secondary);
    }

    /* ─── CATEGORY COLOR THEMES — Blue/Indigo palette ───────────────────────── */
    .theme-0 { --card-accent: #4361ee; color: #6580f5; border-color: rgba(67,97,238,0.28); background: rgba(67,97,238,0.09); }
    .theme-1 { --card-accent: #38bdf8; color: #38bdf8; border-color: rgba(56,189,248,0.25); background: rgba(56,189,248,0.07); }
    .theme-2 { --card-accent: #818cf8; color: #818cf8; border-color: rgba(129,140,248,0.28); background: rgba(129,140,248,0.08); }
    .theme-3 { --card-accent: #2dd4bf; color: #2dd4bf; border-color: rgba(45,212,191,0.25); background: rgba(45,212,191,0.07); }
    .theme-4 { --card-accent: #fbbf24; color: #fbbf24; border-color: rgba(251,191,36,0.25); background: rgba(251,191,36,0.07); }
    .theme-5 { --card-accent: #fb7185; color: #fb7185; border-color: rgba(251,113,133,0.25); background: rgba(251,113,133,0.07); }

    /* ─── RESPONSIVE ─────────────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      :root { --ticker-height: 40px; --header-height: 54px; }
      main { padding: 1.25rem 1rem 4rem; }
      .stat-cell { padding: 0.75rem 0.75rem; }
      .stat-num { font-size: 1.35rem; }
      .card-grid { grid-template-columns: 1fr; }
      .stats-row { flex-wrap: wrap; }
      .ts-display { display: none; }
      .logo-tag { display: none; }
    }

    @media (max-width: 420px) {
      .stats-row { display: grid; grid-template-columns: 1fr 1fr; }
      .stat-cell { border-right: 1px solid var(--border-dim) !important; }
      .stat-cell:nth-child(2n) { border-right: none !important; }
      .stat-cell:nth-child(n+3) { border-top: 1px solid var(--border-dim); }
    }
  </style>
</head>
<body>

  <!-- ═══ TICKER BANNER ══════════════════════════════════════════════════════ -->
  <div class="ticker-banner" id="tickerBanner">
    <div class="ticker-label">
      <div class="ticker-dot"></div>
      Markets
    </div>
    <div class="ticker-scroll-wrap">
      <div class="ticker-track" id="tickerTrack">
        <!-- Populated by JS -->
        <span class="ticker-item">
          <span class="ticker-symbol">Loading market data…</span>
        </span>
      </div>
    </div>
  </div>

  <!-- ═══ HEADER ═════════════════════════════════════════════════════════════ -->
  <header>
    <a class="logo-wrap" href="#">
      <span class="logo-text">Market<span>Pulse</span></span>
      <span class="logo-tag">AI Terminal</span>
    </a>
    <div class="header-right">
      <span class="ts-display" id="tsDisplay">—</span>
      <button class="refresh-btn" onclick="loadNews()" aria-label="Refresh feed">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 11-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/>
        </svg>
        Refresh
      </button>
    </div>
  </header>

  <!-- ═══ MAIN ════════════════════════════════════════════════════════════════ -->
  <main>

    <!-- Stats Row -->
    <div class="stats-row" id="statsRow" style="display:none">
      <!-- populated by JS -->
    </div>

    <!-- Filter Row -->
    <div class="filter-row" id="filterRow" style="display:none">
      <span class="filter-label">View:</span>
    </div>

    <!-- Content Area -->
    <div id="content">
      <div class="state-wrap">
        <div class="spinner"></div>
        <div class="state-title">Loading Intelligence Feed</div>
        <div class="state-msg">Fetching your AI-curated market digest…</div>
      </div>
    </div>

  </main>

  <!-- ═══ FOOTER ══════════════════════════════════════════════════════════════ -->
  <footer>
    <strong>MarketPulse</strong> &nbsp;·&nbsp; AI-curated intelligence &nbsp;·&nbsp;
    Powered by Llama 3.3 via Groq &nbsp;·&nbsp; Auto-updates every 6 hours
  </footer>


  <script>
    // ─── CONSTANTS ─────────────────────────────────────────────────────────────
    const MACRO_CATEGORY = 'Global Macro & NSE Indian Equity Markets';
    const THEME_COUNT    = 6;

    // Known index patterns to parse from the briefing text
    const INDEX_PATTERNS = [
      { sym: 'NIFTY 50',  re: /NIFTY\s*50[:\s]+([₹\d,\.]+)/i },
      { sym: 'SENSEX',    re: /SENSEX[:\s]+([₹\d,\.]+)/i },
      { sym: 'S&P 500',   re: /S&P\s*500[:\s]+([₹\d,\.]+)/i },
      { sym: 'NASDAQ',    re: /NASDAQ[:\s]+([₹\d,\.]+)/i },
      { sym: 'USD/INR',   re: /USD\/INR[:\s]+([₹\d,\.]+)/i },
      { sym: 'BANK NIFTY',re: /BANK\s*NIFTY[:\s]+([₹\d,\.]+)/i },
      { sym: 'DOW',       re: /DOW\s*(?:JONES)?[:\s]+([₹\d,\.]+)/i },
    ];

    // Change direction patterns
    const CHANGE_UP   = /(\+[\d\.]+%|\bup\b|\bgained\b|\brose\b|\bsurged\b)/i;
    const CHANGE_DOWN = /(-[\d\.]+%|\bdown\b|\bfell\b|\bdropped\b|\bslipped\b)/i;

    let allItems     = [];
    let activeFilter = 'ALL';

    // ─── TIMESTAMP ─────────────────────────────────────────────────────────────
    function tick() {
      const el = document.getElementById('tsDisplay');
      if (el) {
        const now = new Date();
        el.textContent = now.toUTCString().replace('GMT', 'UTC');
      }
    }
    tick();
    setInterval(tick, 1000);

    // ─── FETCH & ORCHESTRATE ────────────────────────────────────────────────────
    async function loadNews() {
      showLoading();

      try {
        const res  = await fetch('data.json?t=' + Date.now());
        if (!res.ok) throw new Error(`HTTP ${res.status} — could not fetch data.json`);
        const data = await res.json();
        if (!Array.isArray(data) || data.length === 0)
          throw new Error('data.json is empty or not a valid array.');

        allItems     = data;
        activeFilter = 'ALL';
        buildTicker(allItems);
        renderUI();

      } catch (err) {
        showError(err.message);
      }
    }

    // ─── TICKER BUILDER ────────────────────────────────────────────────────────
    function buildTicker(items) {
      // Find the macro briefing item (first item in MACRO_CATEGORY)
      const macroItem = items.find(i => i.category === MACRO_CATEGORY);
      let tickerItems = [];

      if (macroItem) {
        const text = (macroItem.title || '') + ' ' + (macroItem.summary || '');
        INDEX_PATTERNS.forEach(({ sym, re }) => {
          const m = text.match(re);
          if (m) {
            const isUp   = CHANGE_UP.test(text);
            const isDown = CHANGE_DOWN.test(text);
            tickerItems.push({ sym, val: m[1], dir: isUp ? 'up' : isDown ? 'down' : 'flat' });
          }
        });

        // Fallback: split summary by common delimiters and use as raw items
        if (tickerItems.length === 0) {
          const parts = (macroItem.summary || macroItem.title || '').split(/[;,|·•]+/).map(s => s.trim()).filter(Boolean);
          parts.forEach(p => {
            tickerItems.push({ sym: '', val: p, dir: 'flat' });
          });
        }
      }

      // Always add a generic item set from other categories as fallback filler
      if (tickerItems.length < 4) {
        const categories = [...new Set(items.map(i => i.category))];
        categories.forEach(cat => {
          tickerItems.push({ sym: cat.toUpperCase(), val: items.filter(i => i.category === cat).length + ' STORIES', dir: 'flat' });
        });
      }

      const makeItems = () => tickerItems.map(t => `
        <span class="ticker-item">
          <span class="ticker-symbol">${esc(t.sym)}</span>
          ${t.val ? `<span class="ticker-val">${esc(t.val)}</span>` : ''}
          ${t.dir !== 'flat' ? `<span class="ticker-chg ${t.dir}">${t.dir === 'up' ? '▲' : '▼'}</span>` : ''}
        </span>
      `).join('');

      // Double for seamless loop
      const track = document.getElementById('tickerTrack');
      track.innerHTML = makeItems() + makeItems();
    }

    // ─── RENDER UI ─────────────────────────────────────────────────────────────
    function renderUI() {
      const filtered = activeFilter === 'ALL'
        ? allItems
        : allItems.filter(i => i.category === activeFilter);

      // Group by category preserving insertion order
      const groups   = {};
      filtered.forEach(item => {
        const cat = item.category || 'General';
        (groups[cat] = groups[cat] || []).push(item);
      });

      const allCats    = [...new Set(allItems.map(i => i.category || 'General'))];
      const shownCats  = Object.keys(groups);

      // ── Stats Row
      const statsRow = document.getElementById('statsRow');
      statsRow.style.display = 'flex';
      statsRow.innerHTML = `
        <div class="stat-cell">
          <div class="stat-num">${allItems.length}</div>
          <div class="stat-lbl">Stories</div>
        </div>
        <div class="stat-cell">
          <div class="stat-num">${allCats.length}</div>
          <div class="stat-lbl">Categories</div>
        </div>
        <div class="stat-cell">
          <div class="stat-num">${filtered.length}</div>
          <div class="stat-lbl">Showing</div>
        </div>
        <div class="stat-cell">
          <div class="stat-num" id="aiTagCount">—</div>
          <div class="stat-lbl">AI-curated</div>
        </div>`;

      // Async count estimation
      setTimeout(() => {
        const el = document.getElementById('aiTagCount');
        if (el) el.textContent = allItems.length;
      }, 300);

      // ── Filter Tabs
      const filterRow = document.getElementById('filterRow');
      filterRow.style.display = 'flex';
      const existingTabs = filterRow.querySelectorAll('.filter-tab');
      existingTabs.forEach(t => t.remove());

      [['ALL', 'All'], ...allCats.map(c => [c, c])].forEach(([val, label]) => {
        const btn = document.createElement('button');
        btn.className = 'filter-tab' + (activeFilter === val ? ' active' : '');
        btn.textContent = label;
        btn.addEventListener('click', () => {
          activeFilter = val;
          renderUI();
        });
        filterRow.appendChild(btn);
      });

      // ── Content
      const content = document.getElementById('content');

      if (filtered.length === 0) {
        content.innerHTML = `
          <div class="state-wrap">
            <div style="font-size:2rem;opacity:.3">◈</div>
            <div class="state-title">No Stories</div>
            <div class="state-msg">No items match the selected filter.</div>
          </div>`;
        return;
      }

      content.innerHTML = '';

      shownCats.forEach((cat, ci) => {
        const themeIdx = allCats.indexOf(cat) % THEME_COUNT;
        const section  = document.createElement('div');
        section.className = 'cat-section';
        section.style.animationDelay = (ci * 0.07) + 's';

        section.innerHTML = `
          <div class="cat-header">
            <div class="cat-title theme-${themeIdx}" style="color:inherit">${esc(cat)}</div>
            <div class="cat-pill theme-${themeIdx}">${groups[cat].length} STOR${groups[cat].length === 1 ? 'Y' : 'IES'}</div>
            <div class="cat-line"></div>
          </div>
          <div class="card-grid" id="cg-${ci}"></div>`;

        content.appendChild(section);

        const grid = section.querySelector('.card-grid');
        groups[cat].forEach((item, idx) => {
          grid.appendChild(buildCard(item, themeIdx));
        });
      });
    }

    // ─── CARD BUILDER ──────────────────────────────────────────────────────────
    function buildCard(item, themeIdx) {
      const hasLink = item.link && item.link !== '#';
      const el = document.createElement('a');
      el.className = 'card';
      el.href   = hasLink ? item.link : '#';
      el.target = hasLink ? '_blank' : '_self';
      el.rel    = 'noopener noreferrer';
      el.style.setProperty('--card-accent', getThemeColor(themeIdx));

      const dateStr = item.date ? formatDate(item.date) : '';

      el.innerHTML = `
        <div class="card-top">
          <span class="card-badge theme-${themeIdx}">${esc(item.category || 'General')}</span>
          ${dateStr ? `<span class="card-date">${esc(dateStr)}</span>` : ''}
        </div>
        <div class="card-title">${esc(item.title || 'Untitled')}</div>
        <div class="card-summary">${esc(item.summary || '')}</div>
        <div class="card-footer">
          <span class="card-cta">
            ${hasLink ? 'Read more →' : '—'}
          </span>
        </div>`;

      return el;
    }

    // ─── HELPERS ───────────────────────────────────────────────────────────────
    const THEME_COLORS = ['#38bdf8','#34d399','#a78bfa','#fb923c','#f0b429','#f472b6'];
    function getThemeColor(idx) { return THEME_COLORS[idx % THEME_COLORS.length]; }

    function formatDate(raw) {
      if (!raw) return '';
      try {
        const d = new Date(raw);
        if (isNaN(d)) return raw;
        return d.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
      } catch { return raw; }
    }

    function esc(str) {
      return String(str || '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }

    function showLoading() {
      document.getElementById('content').innerHTML = `
        <div class="state-wrap">
          <div class="spinner"></div>
          <div class="state-title">Loading Intelligence Feed</div>
          <div class="state-msg">Fetching your AI-curated market digest…</div>
        </div>`;
      document.getElementById('statsRow').style.display  = 'none';
      document.getElementById('filterRow').style.display = 'none';
    }

    function showError(msg) {
      document.getElementById('content').innerHTML = `
        <div class="state-wrap">
          <div style="font-size:2rem;opacity:.35">⚠</div>
          <div class="state-title">Feed Unavailable</div>
          <div class="state-msg">
            Could not load <code style="font-family:var(--font-mono);color:var(--accent-cyan)">data.json</code>.
            Make sure the backend has run and the file exists in your repository root.
          </div>
          <div class="err-code">${esc(msg)}</div>
        </div>`;
      document.getElementById('statsRow').style.display  = 'none';
      document.getElementById('filterRow').style.display = 'none';
    }

    // ─── INIT ──────────────────────────────────────────────────────────────────
    loadNews();
  </script>

</body>
</html>
