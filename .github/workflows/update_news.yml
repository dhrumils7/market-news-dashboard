# .github/workflows/update_news.yml
#
# Automated News Feed Updater
# ----------------------------
# Runs every 6 hours (and on manual dispatch).
# Executes backend.py → generates data.json → commits back to main.
#
# REQUIRED SETUP:
#   Repo → Settings → Secrets and variables → Actions
#   Secret name : GEMINI_API_KEY
#   Secret value: your Google Gemini API key

name: Update News Feed

on:
  schedule:
    - cron: '0 */6 * * *'   # 00:00 / 06:00 / 12:00 / 18:00 UTC
  workflow_dispatch:

jobs:
  update-feed:
    name: Generate & Commit data.json
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install google-genai pydantic feedparser

      - name: Run backend.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python backend.py

      - name: Commit and push data.json
        run: |
          git config --local user.name  "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No changes in data.json — skipping commit."
          else
            git commit -m "chore: automated news update [$(date -u +'%Y-%m-%d %H:%M UTC')]"
            git push origin main
            echo "data.json committed and pushed."
          fi
