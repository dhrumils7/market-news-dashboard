name: Update News Feed

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-feed:
    name: Generate & Commit data.json
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      # ── Step 2: Set up Python ─────────────────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ── Step 3: Install dependencies ─────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install google-genai pydantic feedparser

      # ── Step 4: Run the backend script ───────────────────────────────────────
      - name: Run backend.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python backend.py

      - name: Commit and push data.json
        run: |
          git config --local user.name  "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          git add data.json
          
          if git diff --cached --quiet; then
            echo "No changes detected in data.json. Skipping commit."
          else
            git commit -m "chore: automated news feed update [$(date -u +'%Y-%m-%d %H:%M UTC')]"
            git push origin main
            echo "data.json committed and pushed successfully."
          fi
