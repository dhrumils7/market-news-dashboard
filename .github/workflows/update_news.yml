# .github/workflows/update_news.yml
#
# Automated News Feed Updater
# ----------------------------
# Runs every 6 hours (and on manual dispatch).
# Executes backend.py to generate a fresh data.json,
# then commits and pushes it back to the main branch.
#
# REQUIRED SETUP:
#   1. Go to your repo → Settings → Secrets and variables → Actions
#   2. Add a secret named: GEMINI_API_KEY
#      Value: your Google Gemini API key

name: Update News Feed

on:
  schedule:
    # Runs at minute 0, every 6 hours (UTC): 00:00, 06:00, 12:00, 18:00
    - cron: '0 */6 * * *'

  # Allows manual triggering from the GitHub Actions UI
  workflow_dispatch:

jobs:
  update-feed:
    name: Generate & Commit data.json
    runs-on: ubuntu-latest

    # Give the workflow permission to write back to the repository
    permissions:
      contents: write

    steps:
      # ── Step 1: Checkout the repository ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN for authenticated push later
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Step 2: Set up Python ─────────────────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ── Step 3: Install dependencies ─────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install google-genai pydantic

      # ── Step 4: Run the backend script ───────────────────────────────────────
      - name: Run backend.py
        env:
          # Injects the secret as an environment variable for backend.py
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python backend.py

      # ── Step 5: Commit and push data.json back to main ───────────────────────
      - name: Commit and push data.json
        run: |
          git config --local user.name  "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          # Stage only data.json (ignore debug files etc.)
          git add data.json

          # Only commit if data.json actually changed
          if git diff --cached --quiet; then
            echo "No changes detected in data.json. Skipping commit."
          else
            git commit -m "chore: automated news feed update [$(date -u +'%Y-%m-%d %H:%M UTC')]"
            git push origin main
            echo "data.json committed and pushed successfully."
          fi
